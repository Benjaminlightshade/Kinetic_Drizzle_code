path = "/root/.espressif"
idf_path = "/root/.espressif/v5.4.3/esp-idf"
esp_idf_json_path = "/root/.espressif/tools"
tool_download_folder_name = "/root/.espressif/dist"
tool_install_folder_name = "/root/.espressif/tools"
target = ["all"]
idf_versions = ["v6.0-beta2", "v5.5.2", "v5.4.3"]
tools_json_file = "tools/tools.json"
config_file_save_path = "eim_config.toml"
non_interactive = false
wizard_all_questions = false
mirror = "https://dl.espressif.com/github_assets"
idf_mirror = "https://github.com"
pypi_mirror = "https://pypi.org/simple"
recurse_submodules = true
install_all_prerequisites = false
skip_prerequisites_check = false
python_env_folder_name = "python"
activation_script_path_override = "/root/.espressif/tools"
python_version_override = "python313"

[idf_features_per_version]
"v6.0-beta2" = ["core"]
"v5.5.2" = ["core"]
"v5.4.3" = ["core", "ide"]

[idf_tools_per_version]
"v5.5.2" = ["xtensa-esp-elf-gdb", "riscv32-esp-elf-gdb", "xtensa-esp-elf", "esp-clang", "esp-clang-libs", "riscv32-esp-elf", "esp32ulp-elf", "cmake", "openocd-esp32", "ninja", "esp-rom-elfs", "qemu-xtensa", "qemu-riscv32"]
"v6.0-beta2" = ["xtensa-esp-elf-gdb", "riscv32-esp-elf-gdb", "xtensa-esp-elf", "esp-clang", "esp-clang-libs", "riscv32-esp-elf", "esp32ulp-elf", "cmake", "openocd-esp32", "ninja", "esp-rom-elfs", "qemu-xtensa", "qemu-riscv32"]
"v5.4.3" = ["xtensa-esp-elf-gdb", "riscv32-esp-elf-gdb", "xtensa-esp-elf", "esp-clang", "riscv32-esp-elf", "esp32ulp-elf", "cmake", "openocd-esp32", "ninja", "esp-rom-elfs", "qemu-xtensa", "qemu-riscv32"]
